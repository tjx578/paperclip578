schema: paperclip/v1

company:
  monthlyBudgetCents: 16700

agents:
  ultra:
    monthlyBudgetCents: 2500
    heartbeatTriggers:
      - schedule
      - assignment
      - approval_resolution
    personaEligible: true

  protokol:
    monthlyBudgetCents: 1500
    heartbeatTriggers:
      - assignment
      - comment
      - approval_resolution

  hybrid:
    monthlyBudgetCents: 2000
    heartbeatTriggers:
      - schedule
      - assignment
    personaEligible: true

  wolf:
    monthlyBudgetCents: 1400
    heartbeatTriggers:
      - assignment
    inputs:
      env:
        WOLF_ARSENAL_API_KEY:
          kind: secret
          requirement: optional
          description: API key for Tuyul Kartel Wolf Arsenal API v4.0

  qrce:
    monthlyBudgetCents: 1000
    heartbeatTriggers:
      - assignment

  feedguard:
    monthlyBudgetCents: 900
    runtimePlane: external-http
    webhookPath: /webhooks/feedguard
    heartbeatTriggers:
      - schedule

  memvault:
    monthlyBudgetCents: 800
    runtimePlane: external-http
    webhookPath: /webhooks/memvault
    heartbeatTriggers:
      - assignment

  v8-0:
    monthlyBudgetCents: 2000
    heartbeatTriggers:
      - schedule
      - assignment
    personaEligible: true
    inputs:
      env:
        WOLF_ARSENAL_API_KEY:
          kind: secret
          requirement: optional
          description: API key for Tuyul Kartel Wolf Arsenal API v4.0

  v7-4:
    monthlyBudgetCents: 1200
    heartbeatTriggers:
      - assignment
    inputs:
      env:
        WOLF_ARSENAL_API_KEY:
          kind: secret
          requirement: optional
          description: API key for Tuyul Kartel Wolf Arsenal API v4.0

  v7-2:
    monthlyBudgetCents: 1200
    heartbeatTriggers:
      - assignment

  v7-0:
    monthlyBudgetCents: 1200
    heartbeatTriggers:
      - assignment

  v6-0:
    monthlyBudgetCents: 1000
    heartbeatTriggers:
      - schedule
      - assignment

routines:
  weekly-trading-plan:
    cron: "0 20 * * 0"
    timezone: Asia/Singapore
    taskPath: tasks/weekly-trading-plan
    description: Weekly trading plan generation (Sunday 8 PM SGT)

  weekly-review:
    cron: "0 18 * * 5"
    timezone: Asia/Singapore
    taskPath: tasks/weekly-review
    description: Mandatory weekly review (Friday 6 PM SGT)

  asia-confirmation-session:
    cron: "0 10 * * 1-5"
    timezone: Asia/Singapore
    taskPath: tasks/asia-confirmation-session
    description: Daily Asia session confirmation (10 AM SGT weekdays)

  trade-journal-entry:
    cron: "0 22 * * 1-5"
    timezone: Asia/Singapore
    taskPath: tasks/trade-journal-entry
    description: End-of-session journal entry (10 PM SGT weekdays)
